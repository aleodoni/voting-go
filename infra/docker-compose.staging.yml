services:
  db:
    image: ${DB_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DBUSER}
      POSTGRES_PASSWORD: ${DBPASSWORD}
      POSTGRES_DB: ${DBNAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DBUSER}"]
      interval: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    environment:
      KEYCLOAK_ADMIN:
      KEYCLOAK_ADMIN_PASSWORD:
      KC_HOSTNAME: votacao-sso.cmc.pr.gov.br
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: true
      KC_PROXY_HEADERS: xforwarded

    command: --import-realm
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-import/voting-realm.staging.json:/opt/keycloak/data/import/voting-realm.json
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/voting-realm HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 && timeout 3 cat <&3 | grep -q 'voting-realm' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  api:
    image: ${API_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    

  admin:
    image: ${ADMIN_IMAGE}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.txt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  vereador:
    image: ${VEREADOR_IMAGE}
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.txt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata: