name: Build API

on:
  # push:
  #   branches:
  #     - main
  #     - staging
  #   paths:
  #     - 'cmd/**'
  #     - 'internal/**'
  #     - 'pkg/**'
  #     - 'migrations/**'
  #     - 'seeds/**'
  #     - 'go.mod'
  #     - 'go.sum'
  #     - 'infra/docker/api/Dockerfile'
  #     - '.github/workflows/build-api.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/api

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set tags
        id: tags
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BRANCH=${{ github.ref_name }}

          if [ "$BRANCH" = "main" ]; then
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA}" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA}-staging" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max