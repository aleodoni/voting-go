name: Documentação

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Instalar ferramentas
        run: |
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          go install github.com/swaggo/swag/cmd/swag@latest

      - name: Gerar docs Swagger
        run: swag fmt && swag init -g cmd/api/main.go --parseInternal --output _site

      - name: Gerar documentação gomarkdoc
        run: gomarkdoc --output _site/casos-de-uso.md ./internal/application/...

      - name: Baixar Swagger UI
        run: |
          curl -sL https://github.com/swagger-api/swagger-ui/archive/refs/tags/v5.18.2.tar.gz \
            | tar -xz --strip-components=2 -C _site/swagger-ui \
                swagger-ui-5.18.2/dist

      - name: Configurar Swagger UI
        run: |
          sed -i 's|https://petstore.swagger.io/v2/swagger.json|../swagger.json|g' \
            _site/swagger-ui/swagger-initializer.js

      - name: Criar index.html
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8" />
            <title>Docs</title>
          </head>
          <body>
            <h2>Documentação</h2>
            <ul>
              <li><a href="./swagger-ui/index.html">API (Swagger UI)</a></li>
              <li><a href="./casos-de-uso.md">Casos de uso</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Deploy no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site